<?xml version="1.0" encoding="utf-8"?>
<svg version="1.0" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 128 128" xml:space="preserve">
<g id="align">
  <!-- Top object (source) -->
  <rect x="35" y="10" width="58" height="35" rx="3" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <!-- Bottom object (target) -->
  <rect x="35" y="83" width="58" height="35" rx="3" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <!-- Arrow pointing down - alignment direction -->
  <line x1="64" y1="50" x2="64" y2="75" stroke="#EAA032" stroke-width="4" stroke-linecap="round"/>
  <polyline points="52,67 64,79 76,67" fill="none" stroke="#EAA032" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alignment indicator lines -->
  <line x1="30" y1="83" x2="30" y2="45" stroke="#EAA032" stroke-width="2" stroke-dasharray="4,3" stroke-linecap="round"/>
  <line x1="98" y1="83" x2="98" y2="45" stroke="#EAA032" stroke-width="2" stroke-dasharray="4,3" stroke-linecap="round"/>
</g>
</svg>
